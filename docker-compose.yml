services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: always
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway" # Required for SSH to the host
    networks:
      - infra

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    user: "0:0"  # This tells the container to use its internal root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_API_VERSION=1.44
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_POLL_INTERVAL=86400 # Checks once every 24 hours (in seconds)
      - TZ=Europe/London # Change to your timezone
    networks:
      - infra

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    user: "0:0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - 8888:8080
    environment:
      - DOZZLE_LEVEL=trace
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - infra

networks:
  infra:
    external: true
    driver: bridge
